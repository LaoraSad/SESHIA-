{% extends "base.html" %}
{% load static %}

{% block title %}
Finanzas
{% endblock %}

{% block content %}

<h1>Finanzas</h1>

<form
    id="transaction-form"
    method="post"
    action="{% url 'finances:add-transaction' %}"
>
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Agregar gasto
    </button>
</form>

<div id="transactions-list">

</div>

{% endblock %}

{% block js %}
<script src="{% static 'js/finances.js' %}"></script>
{% endblock %}
