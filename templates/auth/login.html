{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar sesión | Seshia{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-brand-100 p-8">
        <img src="{% static 'img/logo.svg' %}" alt="Seshia" class="h-14 w-14 mx-auto mb-4">
        <h1 class="text-2xl font-bold text-brand-700 mb-1 text-center">Iniciar sesión</h1>
        <p class="text-sm text-gray-500 mb-6">Bienvenida de nuevo.</p>

        <form method="post" action="{% url 'users:login' %}">
            {% csrf_token %}
            {% include "components/form_fields.html" %}

            <button type="submit" class="w-full bg-brand-600 text-white font-semibold py-2.5 rounded-xl hover:bg-brand-700 transition">
                Entrar
            </button>
        </form>

        <p class="text-sm text-gray-500 mt-6 text-center">
            ¿Aún no tienes cuenta?
            <a href="{% url 'users:register' %}" class="text-brand-600 font-medium hover:underline">Regístrate</a>
        </p>
    </div>
</div>
{% endblock %}
