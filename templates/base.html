{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}Seshia{% endblock %}
    </title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS propio -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    {% block css %}{% endblock %}
</head>
<body class="min-h-screen bg-gray-100 text-gray-900 flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-indigo-600">
                Seshia
            </a>

            <nav class="space-x-6">
                <a href="/" class="hover:text-indigo-600 transition">Inicio</a>
            </nav>
        </div>
    </header>

    <!-- Contenido -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-6 py-8">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t">
        <div class="max-w-7xl mx-auto px-6 py-4 text-center text-sm text-gray-500">
            © {% now "Y" %} Seshia. Todos los derechos reservados.
        </div>
    </footer>

    {% block js %}{% endblock %}
</body>
</html>
