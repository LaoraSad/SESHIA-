<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% extends "base.html" %}

    {% block content %}

    <h1>Ciclo Menstrual</h1>

    {% if active_cycle %}
        <p>Fase actual: {{ current_phase }}</p>
        <p>Día de la fase: {{ phase_day }}</p>
        <p>Días restantes: {{ days_remaining }}</p>
    {% else %}
        <p>No tienes un ciclo activo.</p>
    {% endif %}

    <form method="post" action="{% url 'cycles:cycle-create' %}">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            Registrar ciclo
        </button>
    </form>

    {% endblock %}
</body>
</html>
