{% extends "base.html" %}

{% block title %}Registro diario | Seshia{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-brand-100 p-8">
        <h1 class="text-2xl font-bold text-brand-700 mb-1">Registro diario</h1>
        <p class="text-sm text-gray-500 mb-6">Cuéntanos cómo te sientes hoy.</p>

        <form method="post" action="{% url 'cycles:daily-log' %}">
            {% csrf_token %}
            {% include "components/form_fields.html" %}

            <button type="submit" class="w-full bg-brand-600 text-white font-semibold py-2.5 rounded-xl hover:bg-brand-700 transition">
                Guardar registro
            </button>
        </form>
    </div>
</div>
{% endblock %}
